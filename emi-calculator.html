<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMI Calculator</title>
</head>
<body>
    <h1>EMI Calculator</h1>
    <label for="principal">Loan Amount:</label>
    <input type="number" id="principal" required><br><br>

    <label for="rate">Interest Rate (annual):</label>
    <input type="number" id="rate" required><br><br>

    <label for="term">Loan Term (years):</label>
    <input type="number" id="term" required><br><br>

    <button onclick="calculateEMI()">Calculate EMI</button>
    <h2 id="result"></h2>

    <script>
        function calculateEMI() {
            var principal = document.getElementById('principal').value;
            var rate = document.getElementById('rate').value / 12 / 100;
            var term = document.getElementById('term').value * 12;

            var emi = (principal * rate * Math.pow(1 + rate, term)) / (Math.pow(1 + rate, term) - 1);
            document.getElementById('result').innerText = 'Monthly EMI: ' + emi.toFixed(2);
        }
    </script>
</body>
</html>
